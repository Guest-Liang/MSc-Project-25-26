name: 构建 Android APK

on:
  push:
    branches: [ "main" ]
    paths:
      - "nfcworkflow/**"
      - ".github/workflows/build-app.yaml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Get current time
        id: date
        run: |
            export TZ='Asia/Shanghai'
            echo "BUILD_TIME=$(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode keystore
        working-directory: nfcworkflow
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
        run: |
          echo "$KEYSTORE_B64" | base64 -d > release.jks

      - name: Build signed Release APK
        working-directory: nfcworkflow
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/nfcworkflow/release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon clean assembleRelease

      - name: Compute release info (normalize apk name)
        id: relinfo
        run: |
          APK_PATH=$(ls -1 nfcworkflow/app/build/outputs/apk/release/*.apk | head -n 1)
          APK_NAME=$(basename "$APK_PATH")

          RAW=${APK_NAME#NFCWorkFlow_v}
          RAW=${RAW%.apk}

          if [[ "$RAW" =~ ^(.+)\(([0-9]+)\)$ ]]; then
            VERSION_NAME="${BASH_REMATCH[1]}"
            VERSION_CODE="${BASH_REMATCH[2]}"
          elif [[ "$RAW" =~ ^(.+)\.([0-9]+)$ ]]; then
            VERSION_NAME="${BASH_REMATCH[1]}"
            VERSION_CODE="${BASH_REMATCH[2]}"
          else
            VERSION_NAME="0.0.0"
            VERSION_CODE="${GITHUB_RUN_NUMBER}"
          fi

          TARGET_NAME="NFCWorkFlow_v${VERSION_NAME}(${VERSION_CODE}).apk"
          if [[ "$APK_NAME" != "$TARGET_NAME" ]]; then
            mv "$APK_PATH" "nfcworkflow/app/build/outputs/apk/release/$TARGET_NAME"
            APK_PATH="nfcworkflow/app/build/outputs/apk/release/$TARGET_NAME"
            APK_NAME="$TARGET_NAME"
          fi

          echo "apk_path=$APK_PATH" >> "$GITHUB_OUTPUT"
          echo "apk_name=$APK_NAME" >> "$GITHUB_OUTPUT"
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"

          echo "tag=v${VERSION_NAME}" >> "$GITHUB_OUTPUT"
          echo "title=NFCWorkFlow v${VERSION_NAME} (${VERSION_CODE})" >> "$GITHUB_OUTPUT"

      - name: Upload Release APK (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: apk-release-signed
          path: nfcworkflow/app/build/outputs/apk/release/*.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.relinfo.outputs.tag }}
          name: ${{ steps.relinfo.outputs.title }}
          body: |
            ### 📱 构建信息
            - 构建分支: ${{ github.ref_name }}
            - 构建时间: ${{ steps.date.outputs.BUILD_TIME }} (UTC+8)
          draft: false
          prerelease: false
          files: ${{ steps.relinfo.outputs.apk_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
