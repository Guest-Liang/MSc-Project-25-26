name: 构建 Android APK

on:
  push:
    branches: [ "main" ]
    paths:
      - "nfcworkflow/**"
      - ".github/workflows/build-app.yaml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 获取当前时间
        id: date
        run: |
            export TZ='Asia/Shanghai'
            echo "BUILD_TIME=$(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Decode keystore
        working-directory: nfcworkflow
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
        run: |
          echo "$KEYSTORE_B64" | base64 -d > release.jks

      - name: 创建 release info (apk names + tag)
        id: relinfo
        run: |
          set -euo pipefail

          # 1) versionName：从 libs.versions.toml 读 app-version
          VERSION_NAME=$(sed -nE 's/^[[:space:]]*app-version[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/p' nfcworkflow/gradle/libs.versions.toml | head -n 1)

          if [[ -z "${VERSION_NAME:-}" ]]; then
            echo "Failed to read app-version from libs.versions.toml"
            exit 1
          fi

          # 2) versionCode：与 Gradle 里的 gitCommitCount 逻辑一致（scoped 优先）
          SCOPED=$(git rev-list --count HEAD -- nfcworkflow 2>/dev/null || echo 0)
          if [[ "$SCOPED" -gt 0 ]]; then
            VERSION_CODE="$SCOPED"
          else
            ALL=$(git rev-list --count HEAD 2>/dev/null || echo 0)
            VERSION_CODE=$([[ "$ALL" -gt 0 ]] && echo "$ALL" || echo 1)
          fi

          BRANCH_NAME="${GITHUB_REF_NAME}"
          BRANCH_SLUG=$(printf '%s' "$BRANCH_NAME" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9]+/-/g; s/^-+//; s/-+$//')
          if [[ -z "${BRANCH_SLUG:-}" ]]; then
            BRANCH_SLUG="branch"
          fi

          if [[ "$BRANCH_NAME" == "main" ]]; then
            TAG="v${VERSION_NAME}+${VERSION_CODE}"
            TITLE="NFCWorkFlow v${VERSION_NAME} (${VERSION_CODE})"
            PRERELEASE="false"
          else
            TAG="v${VERSION_NAME}+${VERSION_CODE}-${BRANCH_SLUG}-r${GITHUB_RUN_NUMBER}-a${GITHUB_RUN_ATTEMPT}"
            TITLE="NFCWorkFlow v${VERSION_NAME} (${VERSION_CODE}) [${BRANCH_NAME}]"
            PRERELEASE="true"
          fi

          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "title=$TITLE" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"

      - name: Fail if tag already exists
        run: |
          set -euo pipefail
          git fetch --tags --force
          if git show-ref --tags --verify --quiet "refs/tags/${{ steps.relinfo.outputs.tag }}"; then
            echo "Tag already exists: ${{ steps.relinfo.outputs.tag }}"
            exit 1
          fi

      - name: 生成自上个 tag 以来的 Changelog
        id: changelog
        run: |
          set -euo pipefail
          git fetch --tags --force

          PREV_TAG="$(git tag --list 'v*+*' --sort=-creatordate | grep -E '^v.+\+[0-9]+$' | head -n 1 || true)"

          if [[ -n "${PREV_TAG:-}" ]]; then
            echo "Found previous tag: $PREV_TAG"
            RANGE="${PREV_TAG}..HEAD"
          else
            echo "No previous tag found"
            RANGE="HEAD"
          fi

          if [[ "$RANGE" == "HEAD" ]]; then
            SINGLE_CHANGELOG="$(git log -n 50 --pretty=format:'%h %s' HEAD)"
            FULL_CHANGELOG="$(git log -n 50 --pretty=format:'---%n### %h%n%B%n' HEAD)"
          else
            SINGLE_CHANGELOG="$(git log --pretty=format:'%h %s' "$RANGE")"
            FULL_CHANGELOG="$(git log --pretty=format:'---%n### %h%n%B%n' "$RANGE")"
          fi

          {
            echo "changelog<<EOF"
            echo "$SINGLE_CHANGELOG"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          {
            echo "full_changelog<<EOF"
            echo "$FULL_CHANGELOG"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: 编译带签名的 APK
        working-directory: nfcworkflow
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/nfcworkflow/release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon clean assembleRelease assembleDebug

      # 1. ARM 64-v8a
      - name: Upload Release APK (arm64-v8a)
        uses: actions/upload-artifact@v7
        with:
          path: nfcworkflow/app/build/outputs/apk/release/*-release-arm64-v8a.apk
          archive: false

      # 2. ARM v7a
      - name: Upload Release APK (armeabi-v7a)
        uses: actions/upload-artifact@v7
        with:
          path: nfcworkflow/app/build/outputs/apk/release/*-release-armeabi-v7a.apk
          archive: false

      # 3. x86_64
      - name: Upload Release APK (x86_64)
        uses: actions/upload-artifact@v7
        with:
          path: nfcworkflow/app/build/outputs/apk/release/*-release-x86_64.apk
          archive: false

      # 4. Universal
      - name: Upload Release APK (Universal)
        uses: actions/upload-artifact@v7
        with:
          path: nfcworkflow/app/build/outputs/apk/release/*-release-universal.apk
          archive: false

      - name: Upload Debug Universal APK
        uses: actions/upload-artifact@v7
        with:
          path: nfcworkflow/app/build/outputs/apk/debug/*-debug-universal.apk
          archive: false

      - name: 创建 GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          release_apks=(nfcworkflow/app/build/outputs/apk/release/*-release-*.apk)
          debug_apks=(nfcworkflow/app/build/outputs/apk/debug/*-debug-universal.apk)
          prerelease_flag=()
          release_type="Stable"

          if [[ "${#release_apks[@]}" -eq 0 ]]; then
            echo "No release APKs found"
            exit 1
          fi

          if [[ "${#debug_apks[@]}" -eq 0 ]]; then
            echo "No debug universal APK found"
            exit 1
          fi

          if [[ "${{ steps.relinfo.outputs.prerelease }}" == "true" ]]; then
            prerelease_flag=(--prerelease)
            release_type="Prerelease"
          fi

          cat > release_notes.md <<'EOF'
          ### 📱 构建信息
          - 构建分支: ${{ github.ref_name }}
          - 构建时间: ${{ steps.date.outputs.BUILD_TIME }} (UTC+8)
          - Release 类型: RELEASE_TYPE_PLACEHOLDER
          ### 🧾 本次变更（自上次 Release 以来）
          ${{ steps.changelog.outputs.changelog }}

          <details>
          <summary>查看完整 Commit 信息</summary>

          ${{ steps.changelog.outputs.full_changelog }}

          </details>
          EOF

          sed -i "s/RELEASE_TYPE_PLACEHOLDER/${release_type}/" release_notes.md

          gh release create "${{ steps.relinfo.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --target "${GITHUB_SHA}" \
            --title "${{ steps.relinfo.outputs.title }}" \
            --notes-file release_notes.md \
            "${prerelease_flag[@]}" \
            "${release_apks[@]}" \
            "${debug_apks[@]}"
