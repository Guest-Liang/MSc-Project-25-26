name: 构建 Android APK

on:
  push:
    branches: [ "main" ]
    paths:
      - "nfcworkflow/**"
      - ".github/workflows/build-app.yaml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Get current time
        id: date
        run: |
            export TZ='Asia/Shanghai'
            echo "BUILD_TIME=$(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode keystore
        working-directory: nfcworkflow
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
        run: |
          echo "$KEYSTORE_B64" | base64 -d > release.jks

      - name: Compute release info (apk names + tag)
        id: relinfo
        run: |
          set -euo pipefail

          # 1) versionName：从 libs.versions.toml 读 app-version
          VERSION_NAME=$(sed -nE 's/^[[:space:]]*app-version[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/p' nfcworkflow/gradle/libs.versions.toml | head -n 1)

          if [[ -z "${VERSION_NAME:-}" ]]; then
            echo "Failed to read app-version from libs.versions.toml"
            exit 1
          fi

          # 2) versionCode：与 Gradle 里的 gitCommitCount 逻辑一致（scoped 优先）
          SCOPED=$(git rev-list --count HEAD -- nfcworkflow 2>/dev/null || echo 0)
          if [[ "$SCOPED" -gt 0 ]]; then
            VERSION_CODE="$SCOPED"
          else
            ALL=$(git rev-list --count HEAD 2>/dev/null || echo 0)
            VERSION_CODE=$([[ "$ALL" -gt 0 ]] && echo "$ALL" || echo 1)
          fi

          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION_NAME}+${VERSION_CODE}" >> "$GITHUB_OUTPUT"
          echo "title=NFCWorkFlow v${VERSION_NAME} (${VERSION_CODE})" >> "$GITHUB_OUTPUT"

      - name: Fail if tag already exists
        if: github.ref_name == 'main'
        run: |
          set -euo pipefail
          git fetch --tags --force
          if git show-ref --tags --verify --quiet "refs/tags/${{ steps.relinfo.outputs.tag }}"; then
            echo "Tag already exists: ${{ steps.relinfo.outputs.tag }}"
            exit 1
          fi

      - name: Build signed Release APK
        working-directory: nfcworkflow
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/nfcworkflow/release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon clean assembleRelease assembleDebug

      - name: Upload Release APK (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: apk-release-signed
          path: |
            nfcworkflow/app/build/outputs/apk/release/*-release.apk
            nfcworkflow/app/build/outputs/apk/debug/*-debug.apk

      - name: Create GitHub Release
        if: github.ref_name == 'main'
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: true
          tag_name: ${{ steps.relinfo.outputs.tag }}
          name: ${{ steps.relinfo.outputs.title }}
          body: |
            ### 📱 构建信息
            - 构建分支: ${{ github.ref_name }}
            - 构建时间: ${{ steps.date.outputs.BUILD_TIME }} (UTC+8)
          draft: false
          prerelease: false
          files: |
            nfcworkflow/app/build/outputs/apk/release/*-release.apk
            nfcworkflow/app/build/outputs/apk/debug/*-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
