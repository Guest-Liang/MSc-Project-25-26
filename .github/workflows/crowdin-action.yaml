name: Crowdin Sync

on:
  push:
    branches:
      - dev
    paths:
      - "nfcworkflow/app/src/main/res/values/strings.xml"
      - "crowdin.yml"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: crowdin-dev
  cancel-in-progress: true

jobs:
  crowdin-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Upload sources
        uses: crowdin/github-action@v2
        with:
          config: crowdin.yml
          upload_sources: true
          upload_translations: false
          crowdin_branch_name: dev
          project_id: ${{ secrets.CROWDIN_PROJECT_ID }}
          token: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download translations
        uses: crowdin/github-action@v2
        with:
          config: crowdin.yml
          project_id: ${{ secrets.CROWDIN_PROJECT_ID }}
          token: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}
          download_translations: true
          skip_untranslated_strings: true
          skip_untranslated_files: true
          crowdin_branch_name: dev
          localization_branch_name: l10n_dev
          push_translations: true
          push_sources: false
          create_pull_request: true
          pull_request_base_branch_name: dev
          pull_request_title: ":globe_with_meridians: sync Crowdin translations"
          pull_request_body: "Automated translation sync from Crowdin"
          commit_message: ":globe_with_meridians: sync translations from Crowdin"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}